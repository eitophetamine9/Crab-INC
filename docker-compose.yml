services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: crabinc
      MYSQL_USER: crabinc
      MYSQL_PASSWORD: crabinc
      MYSQL_ROOT_PASSWORD: crabinc-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema/mysql.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pcrabinc-root"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: crabinc
      PMA_PASSWORD: crabinc
      MYSQL_ROOT_PASSWORD: crabinc-root
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
